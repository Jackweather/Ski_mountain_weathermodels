
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Model GL Website</title>
	<style>
		   .gore-images {
			   display: grid;
			   grid-template-columns: repeat(2, 1fr);
			   grid-template-rows: repeat(2, auto);
			   gap: 16px;
			   margin-top: 20px;
			   max-width: 1300px;
		   }
		   .gore-images img {
			   width: auto;
			   max-width: 600px;
			   height: auto;
			   border: 1px solid #ccc;
			   border-radius: 8px;
			   box-shadow: 2px 2px 8px #aaa;
			   justify-self: center;
		   }
	</style>
</head>
<body>
	<button id="showGoreBtn">Gore Mountain</button>
	<div id="goreImages" class="gore-images" style="display:none;"></div>
	<script src="/js_routes/main.js"></script>
</body>
</html>
